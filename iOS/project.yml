name: Trucktrack
options:
  bundleIdPrefix: com.shimondeitel.foodtruckspend
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Trucktrack:
    type: application
    platform: iOS
    sources:
      - path: Trucktrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foodtruckspend
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Trucktrack/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TrucktrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TrucktrackTests
      - path: Trucktrack.storekit
    dependencies:
      - target: Trucktrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foodtruckspend.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TrucktrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TrucktrackUITests
    dependencies:
      - target: Trucktrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foodtruckspend.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Trucktrack:
    build:
      targets:
        Trucktrack: all
        TrucktrackTests: [test]
        TrucktrackUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Trucktrack.storekit
    test:
      config: Debug
      storeKitConfiguration: Trucktrack.storekit
      targets:
        - TrucktrackTests
        - TrucktrackUITests
    archive:
      config: Release
